<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="format-detection" content="telephone=no">
  <title>Pedro Girardi Photography</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="photography.css">
</head>
<body>
  <header class="top-bar">
    <h1 class="brand">Pedro Girardi Photography</h1>
    <nav class="nav" aria-label="Photography collections">
      <a class="nav-link" href="#street">Street</a>
      <a class="nav-link" href="#concert">Concert</a>
    </nav>
  </header>

  <main>
    <section class="collection" id="street">
      <div class="collection-header">
        <h2>Street</h2>
      </div>
      <div class="gallery-grid">
        <img src="Photography/street1.jpg" alt="Street photograph 1">
        <img src="Photography/street2.jpg" alt="Street photograph 2" loading="lazy">
        <img src="Photography/street3.jpg" alt="Street photograph 3" loading="lazy">
        <img src="Photography/street4.jpg" alt="Street photograph 4" loading="lazy">
        <img src="Photography/street6.jpg" alt="Street photograph 6" loading="lazy">
        <img src="Photography/street7.jpg" alt="Street photograph 7" loading="lazy">
        <img src="Photography/street8.jpg" alt="Street photograph 8" loading="lazy">
        <img src="Photography/street9.jpg" alt="Street photograph 9" loading="lazy">
        <img src="Photography/street10.jpg" alt="Street photograph 10" loading="lazy">
        <img src="Photography/street11.jpg" alt="Street photograph 11" loading="lazy">
        <img src="Photography/street12.jpg" alt="Street photograph 12" loading="lazy">
      </div>
    </section>

    <section class="collection" id="concert">
      <div class="collection-header">
        <h2>Concert</h2>
      </div>
      <div class="gallery-grid">
        <img src="Photography/concert0.jpg" alt="Concert photograph 1" loading="lazy">
        <img src="Photography/concert1.jpg" alt="Concert photograph 2" loading="lazy">
        <img src="Photography/concert2.jpg" alt="Concert photograph 3" loading="lazy">
        <img src="Photography/concert3.jpg" alt="Concert photograph 4" loading="lazy">
        <img src="Photography/concert5.jpg" alt="Concert photograph 5" loading="lazy">
        <img src="Photography/concert6.jpg" alt="Concert photograph 6" loading="lazy">
        <img src="Photography/concert7.jpg" alt="Concert photograph 7" loading="lazy">
        <img src="Photography/concert12.jpg" alt="Concert photograph 8" loading="lazy">
      </div>
    </section>
  </main>

  <footer class="footer">
    <p>For prints and commissions: <a href="mailto:contact@girardi.io">contact@girardi.io</a></p>
    <p>Based in Rome.</p>
  </footer>

  <div class="lightbox" role="dialog" aria-modal="true" aria-label="Expanded photo view">
    <div class="lightbox-content">
      <button class="lightbox-close" type="button" aria-label="Close photo view">&#x2715;</button>
      <button class="lightbox-prev" type="button" aria-label="Previous photograph">&#8249;</button>
      <button class="lightbox-next" type="button" aria-label="Next photograph">&#8250;</button>
      <img src="" alt="">
    </div>
  </div>

  <script src="photography.js"></script>
</body>
</html>
