  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

;height:60px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;flex:none;box-shadow:0 4px 14px rgba(0,0,0,.25);\">\n          <img src=\"2dbeee5b-054c-4f60-893e-32c32d523997\" alt=\"Diritti dei Pedoni\" style=\"width:54px;height:54px;border-radius:50%;object-fit:cover;display:block;\">\n        <\u002Fdiv>\n        <div style=\"line-height:1.2;\">\n          <div style=\"font-family:'Archivo',sans-serif;font-weight:800;font-size:16px;letter-spacing:.02em;color:#fff;\">Diritti dei Pedoni<\u002Fdiv>\n          <div style=\"font-size:12.5px;letter-spacing:.16em;text-transform:uppercase;color:#9fb4cb;font-weight:600;\">Roma / Sicurezza stradale<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"margin-left:auto;font-size:12.5px;letter-spacing:.14em;text-transform:uppercase;color:#7e95ae;font-weight:600;text-align:right;\">Report di analisi<br>Giugno 2026<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"font-family:'Archivo',sans-serif;font-weight:700;font-size:14px;letter-spacing:.16em;text-transform:uppercase;color:#e8a9b2;margin-bottom:18px;\">Serie storica 2008-2022 · dalla diagnosi all'azione<\u002Fdiv>\n      <h1 style=\"font-family:'Archivo',sans-serif;font-weight:900;font-size:clamp(32px,7.5vw,58px);line-height:1.04;letter-spacing:-.02em;margin:0 0 22px;max-width:20ch;\">Quindici anni, gli stessi morti. Dove intervenire adesso.<\u002Fh1>\n      <p style=\"font-size:19px;line-height:1.65;color:#cdd9e6;max-width:64ch;margin:0;font-weight:450;\">Dal 2008 all'agosto 2022 Roma ha registrato <strong style=\"color:#fff;\">450.847 incidenti<\u002Fstrong> e <strong style=\"color:#fff;\">1.914 morti<\u002Fstrong>, di cui <strong style=\"color:#fff;\">742 pedoni<\u002Fstrong>. La città è diventata più sicura per chi sta in auto, non per chi cammina. I pedoni muoiono <strong style=\"color:#fff;\">sulle stesse strade da quindici anni<\u002Fstrong>. L'unico grande intervento che i dati rivelano: la chiusura dei Fori Imperiali, che ha azzerato gli incidenti dell'<strong style=\"color:#fff;\">81%<\u002Fstrong>.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <main style=\"max-width:1080px;margin:0 auto;padding:0 28px 90px;\">\n\n    <!-- KPIs -->\n    <section style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:16px;margin-top:-72px;position:relative;z-index:3;\">\n      <div style=\"background:#fff;border-radius:16px;padding:24px 22px;box-shadow:0 8px 30px rgba(19,40,63,.10);border:1px solid #ece6db;\">\n        <div style=\"font-family:'Archivo',sans-serif;font-weight:900;font-size:clamp(24px,3vw,36px);line-height:1;color:#13283f;\">450.847<\u002Fdiv>\n        <div style=\"font-size:12.5px;letter-spacing:.08em;text-transform:uppercase;color:#7d8794;margin-top:10px;font-weight:600;\">Incidenti 2008-2022<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:#fff;border-radius:16px;padding:24px 22px;box-shadow:0 8px 30px rgba(19,40,63,.10);border:1px solid #ece6db;\">\n        <div style=\"font-family:'Archivo',sans-serif;font-weight:900;font-size:clamp(24px,3vw,36px);line-height:1;color:#c4112f;\">1.914<\u002Fdiv>\n        <div style=\"font-size:12.5px;letter-spacing:.08em;text-transform:uppercase;color:#7d8794;margin-top:10px;font-weight:600;\">Morti totali<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:#c4112f;border-radius:16px;padding:24px 22px;box-shadow:0 8px 30px rgba(196,17,47,.22);color:#fff;\">\n        <div style=\"font-family:'Archivo',sans-serif;font-weight:900;font-size:clamp(24px,3vw,36px);line-height:1;\">742<\u002Fdiv>\n        <div style=\"font-size:12.5px;letter-spacing:.08em;text-transform:uppercase;color:#f6d2d8;margin-top:10px;font-weight:600;\">Pedoni morti<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:#fff;border-radius:16px;padding:24px 22px;box-shadow:0 8px 30px rgba(19,40,63,.10);border:1px solid #ece6db;\">\n        <div style=\"font-family:'Archivo',sans-serif;font-weight:900;font-size:clamp(24px,3vw,36px);line-height:1;color:#c4112f;\">21<\u002Fdiv>\n        <div style=\"font-size:12.5px;letter-spacing:.08em;text-transform:uppercase;color:#7d8794;margin-top:10px;font-weight:600;\">Pedoni morti sulla sola Via Casilina<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:#fff;border-radius:16px;padding:24px 22px;box-shadow:0 8px 30px rgba(19,40,63,.10);border:1px solid #ece6db;\">\n        <div style=\"font-family:'Archivo',sans-serif;font-weight:900;font-size:clamp(24px,3vw,36px);line-height:1;color:#13283f;\">-81%<\u002Fdiv>\n        <div style=\"font-size:12.5px;letter-spacing:.08em;text-transform:uppercase;color:#7d8794;margin-top:10px;font-weight:600;\">Incidenti dopo la chiusura dei Fori<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <p style=\"font-size:14px;line-height:1.6;color:#7d8794;margin:24px 2px 0;font-style:italic;\">Il 2022 copre solo gennaio-agosto: dove indicato è segnalato come <strong>parziale<\u002Fstrong> ed escluso dalle serie per anno.<\u002Fp>\n\n    <!-- PARTE I -->\n    <div style=\"display:inline-block;font-family:'Archivo',sans-serif;font-weight:700;font-size:12.5px;letter-spacing:.18em;text-transform:uppercase;color:#7d8794;margin-top:52px;border-top:2px solid #e2dccf;padding-top:14px;\">Parte I - La diagnosi<\u002Fdiv>\n\n    <!-- 01 -->\n    <section data-screen-label=\"01 La città si è fatta più sicura\" style=\"margin-top:40px;\">\n      <div style=\"display:flex;align-items:center;gap:16px;margin-bottom:10px;\">\n        <span style=\"font-family:'Archivo',sans-serif;font-weight:800;font-size:15px;color:#c4112f;letter-spacing:.06em;\">01<\u002Fspan>\n        <span style=\"flex:1;height:2px;background:#e2dccf;\"><\u002Fspan>\n      <\u002Fdiv>\n      <h2 style=\"font-family:'Archivo',sans-serif;font-weight:800;font-size:clamp(24px,4.8vw,34px);line-height:1.1;color:#13283f;margin:0 0 18px;letter-spacing:-.015em;\">La città si è fatta più sicura, ma non per i pedoni<\u002Fh2>\n      <p style=\"font-size:17px;line-height:1.65;max-width:68ch;margin:0 0 18px;\">Tra il biennio 2008-2009 e il 2018-2019 i <strong>morti totali<\u002Fstrong> sulle strade di Roma sono scesi di circa il <strong>21%<\u002Fstrong> (da 165 a 130 l'anno). I <strong>pedoni morti<\u002Fstrong> sono calati molto meno: appena <strong>4,1%<\u002Fstrong> (da 61 a 58).<\u002Fp>\n      <p style=\"font-size:17px;line-height:1.65;max-width:68ch;margin:0 0 24px;\">La <strong>quota di pedoni sul totale dei morti è cresciuta<\u002Fstrong> di circa <strong>0,7 punti percentuali all'anno<\u002Fstrong> fino al 2019. Negli anni più recenti i pedoni pesano per oltre <strong>un morto su tre<\u002Fstrong>, con punte vicine alla <strong>metà<\u002Fstrong> (2017-2018).<\u002Fp>\n\n      <!-- CHART 1: dual line chart SVG -->\n      <div style=\"background:#fff;border:1px solid #ece6db;border-radius:14px;padding:28px 30px;box-shadow:0 1px 2px rgba(19,40,63,.05);\">\n        <div style=\"font-family:'Archivo',sans-serif;font-weight:700;font-size:15px;color:#13283f;margin-bottom:4px;\">Morti sulle strade di Roma, 2008-2021<\u002Fdiv>\n        <div style=\"font-size:13px;color:#7d8794;margin-bottom:16px;\">I morti totali calano; i pedoni molto meno<\u002Fdiv>\n        <div style=\"display:flex;gap:20px;margin-bottom:14px;\">\n          <span style=\"display:inline-flex;align-items:center;gap:7px;font-size:13px;font-weight:600;color:#13283f;\"><span style=\"width:24px;height:3px;background:#13283f;border-radius:2px;display:inline-block;\"><\u002Fspan>Totali<\u002Fspan>\n          <span style=\"display:inline-flex;align-items:center;gap:7px;font-size:13px;font-weight:600;color:#c4112f;\"><span style=\"width:24px;height:3px;background:#c4112f;border-radius:2px;display:inline-block;\"><\u002Fspan>Pedoni<\u002Fspan>\n        <\u002Fdiv>\n        <svg viewBox=\"0 0 760 260\" style=\"width:100%;display:block;\" xmlns=\"http://www.w3.org/2000/svg\">\n          <!-- grid lines -->\n          <line x1=\"50\" y1=\"53\" x2=\"750\" y2=\"53\" st 2Fcircle>\n          <circle cx=\"373\" cy=\"78\" r=\"4\" fill=\"#fff\" stroke=\"#13283f\" stroke-width=\"2\"><\u002Fcircle>\n          <circle cx=\"427\" cy=\"61\" r=\"4\" fill=\"#fff\" stroke=\"#13283f\" stroke-width=\"2\"><\u002Fcircle>\n          <circle cx=\"481\" cy=\"95\" r=\"4\" fill=\"#fff\" stroke=\"#13283f\" stroke-width=\"2\"><\u002Fcircle>\n          <circle cx=\"535\" cy=\"83\" r=\"4\" fill=\"#fff\" stroke=\"#13283f\" stroke-width=\"2\"><\u002Fcircle>\n          <circle cx=\"589\" cy=\"71\" r=\"4\" fill=\"#fff\" stroke=\"#13283f\" stroke-width=\"2\"><\u002Fcircle>\n          <circle cx=\"642\" cy=\"88\" r=\"4\" fill=\"#fff\" stroke=\"#13283f\" stroke-width=\"2\"><\u002Fcircle>\n          <circle cx=\"696\" cy=\"129\" r=\"4\" fill=\"#fff\" stroke=\"#13283f\" stroke-width=\"2\"><\u002Fcircle>\n          <circle cx=\"750\" cy=\"113\" r=\"4\" fill=\"#fff\" stroke=\"#13283f\" stroke-width=\"2\"><\u002Fcircle>\n          <!-- Pedoni line -->\n          <polyline points=\"50,172 104,161 158,177 212,176 265,172 319,182 373,177 427,186 481,195 535,166 589,156 642,181 696,191 750,202\" fill=\"none\" stroke=\"#c4112f\" stroke-width=\"2.5\" stroke-linejoin=\"round\" stroke-linecap=\"round\"><\u002Fpolyline>\n          <!-- Pedoni dots -->\n          <circle cx=\"50\" cy=\"172\" r=\"4\" fill=\"#fff\" stroke=\"#c4112f\" stroke-width=\"2\"><\u002Fcircle>\n          <circle cx=\"104\" cy=\"161\" r=\"4\" fill=\"#fff\" stroke=\"#c4112f\" stroke-width=\"2\"><\u002Fcircle>\n          <circle cx=\"158\" cy=\"177\" r=\"4\" fill=\"#fff\" stroke=\"#c4112f\" stroke-width=\"2\"><\u002Fcircle>\n          <circle cx=\"212\" cy=\"176\" r=\"4\" fill=\"#fff\" stroke=\"#c4112f\" stroke-width=\"2\"><\u002Fcircle>\n          <circle cx=\"265\" cy=\"172\" r=\"4\" fill=\"#fff\" stroke=\"#c4112f\" stroke-width=\"2\"><\u002Fcircle>\n          <circle cx=\"319\" cy=\"182\" r=\"4\" fill=\"#fff\" stroke=\"#c4112f\" stroke-width=\"2\"><\u002Fcircle>\n          <circle cx=\"373\" cy=\"177\" r=\"4\" fill=\"#fff\" stroke=\"#c4112f\" stroke-width=\"2\"><\u002Fcircle>\n          <circle cx=\"427\" cy=\"186\" r=\"4\" fill=\"#fff\" stroke=\"#c4112f\" stroke-width=\"2\"><\u002Fcircle>\n          <circle cx=\"481\" cy=\"195\" r=\"4\" fill=\"#fff\" stroke=\"#c4112f\" stroke-width=\"2\"><\u002Fcircle>\n          <circle cx=\"535\" cy=\"166\" r=\"4\" fill=\"#fff\" stroke=\"#c4112f\" stroke-width=\"2\"><\u002Fcircle>\n          <circle cx=\"589\" cy=\"156\" r=\"4\" fill=\"#fff\" stroke=\"#c4112f\" stroke-width=\"2\"><\u002Fcircle>\n          <circle cx=\"642\" cy=\"181\" r=\"4\" fill=\"#fff\" stroke=\"#c4112f\" stroke-width=\"2\"><\u002Fcircle>\n          <circle cx=\"696\" cy=\"191\" r=\"4\" fill=\"#fff\" stroke=\"#c4112f\" stroke-width=\"2\"><\u002Fcircle>\n          <circle cx=\"750\" cy=\"202\" r=\"4\" fill=\"#fff\" stroke=\"#c4112f\" stroke-width=\"2\"><\u002Fcircle>\n          <!-- x-axis labels -->\n          <text x=\"50\" y=\"258\" text-anchor=\"middle\" font-family=\"Libre Franklin,sans-serif\" font-size=\"11\" fill=\"#9aa3ad\">2008<\u002Ftext>\n          <text x=\"158\" y=\"258\" text-anchor=\"middle\" font-family=\"Libre Franklin,sans-serif\" font-size=\"11\" fill=\"#9aa3ad\">2010<\u002Ftext>\n          <text x=\"265\" y=\"258\" text-anchor=\"middle\" font-family=\"Libre Franklin,sans-serif\" font-size=\"11\" fill=\"#9aa3ad\">2012<\u002Ftext>\n          <text x=\"373\" y=\"258\" text-anchor=\"middle\" font-family=\"Libre Franklin,sans-serif\" font-size=\"11\" fill=\"#9aa3ad\">2014<\u002Ftext>\n          <text x=\"481\" y=\"258\" text-anchor=\"middle\" font-family=\"Libre Franklin,sans-serif\" font-size=\"11\" fill=\"#9aa3ad\">2016<\u002Ftext>\n          <text x=\"589\" y=\"258\" text-anchor=\"middle\" font-family=\"Libre Franklin,sans-serif\" font-size=\"11\" fill=\"#9aa3ad\">2018<\u002Ftext>\n          <text x=\"696\" y=\"258\" text-anchor=\"middle\" font-family=\"Libre Franklin,sans-serif\" font-size=\"11\" fill=\"#9aa3ad\">2020<\u002Ftext>\n          <text x=\"750\" y=\"258\" text-anchor=\"middle\" font-family=\"Libre Franklin,sans-serif\" font-size=\"11\" fill=\"#9aa3ad\">2021<\u002Ftext>\n        <\u002Fsvg>\n      <\u002Fdiv>\n\n      <div style=\"background:#fff;border:1px solid #ece6db;border-left:4px solid #c4112f;border-radius:14px;padding:22px 26px;margin-top:18px;box-shadow:0 1px 2px rgba(19,40,63,.05);\">\n        <h4 style=\"font-family:'Archivo',sans-serif;font-weight:700;font-size:17px;color:#c4112f;margin:0 0 8px;\">La sicurezza stradale ha lasciato indietro i pedoni<\u002Fh4>\n        <p style=\"font-size:16px;line-height:1.6;margin:0;color:#3f4954;\">I progressi degli ultimi quindici anni hanno protetto soprattutto chi viaggia <em>dentro<\u002Fem> un veicolo. Chi cammina rappresenta oggi una quota crescente delle vittime: è il segno che gli interventi su veicoli e conducenti non bastano, e che il problema pedonale richiede interventi <strong>sull'infrastruttura<\u002Fstrong>.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- 02 -->\n    <section data-screen-label=\"02 Le strade che uccidono\" style=\"margin-top:64px;\">\n      <div style=\"display:flex;align-items:center;gap:16px;margin-bottom:10px;\">\n        <span style=\"font-family:'Archivo',sans-serif;font-weight:800;font-size:15px;color:#c4112f;letter-spacing:.06em;\">02<\u002Fspan>\n        <span style=\"flex:1;height:2px;background:#e2dccf;\"><\u002Fspan>\n      <\u002Fdiv>\n      <h2 style=\"font-family:'Archivo',sans-serif;font-weight:800;font-size:clamp(24px,4.8vw,34px);line-height:1.1;color:#13283f;margin:0 0 18px;letter-spacing:-.015em;\">Le strade che uccidono pedoni da quindici anni<\u002Fh2>\n      <p style=\"font-size:17px;line-height:1.65;max-width:68ch;margin:0 0 24px;\">L'analisi di un solo anno non distingue una strada strutturalmente pericolosa da una coincidenza. <strong>Quindici anni sì.<\u002Fstrong> Aggregando i morti pedoni per strada e contando in quanti anni distinti ciascuna ha ucciso, emergono le <strong>arterie croniche<\u002Fstrong>: non punti caldi occasionali, ma corridoi che mietono vittime con regolarità da oltre un decennio.<\u002Fp>\n\n      <!-- CHART 2: horizontal bars -->\n      <div style=\"background:#fff;border:1px solid #ece6db;border-radius:14px;padding:28px 30px;box-shadow:0 1px 2px rgba(19,40,63,.05);margin-bottom:18px;\">\n        <div style=\"font-family:'Archivo',sans-serif;font-weight:700;font-size:15px;color:#13283f;margin-bottom:4px;\">Le arterie croniche: morti pedoni per strada, 15 anni<\u002Fdiv>\n        <div style=\"font-size:13px;color:#7d8794;margin-bottom:22px;\">Colore = anni distinti in cui la strada ha ucciso almeno un pedone<\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:12px;\">\n          <div style=\"display:flex;align-items:center;gap:14px;\">\n            <div style=\"width:170px;flex:none;font-size:14px;font-weight:600;color:#c4112f;text-align:right;\">Via Casilina<\u002Fdiv>\n            <div style=\"flex:1;height:28px;background:#f0ece3;border-radius:6px;overflow:hidden;\"><div style=\"width:100%;height:100%;background:#c4112f;border-radius:6px;\"><\u002Fdiv><\u002Fdiv>\n            <div style=\"width:130px;flex:none;font-size:13px;color:#5a6470;\">21 morti · 11 anni<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:14px;\">\n            <div style=\"width:170px;flex:none;font-size:14px;font-weight:600;color:#13283f;text-align:right;\">Via Tuscolana<\u002Fdiv>\n            <div style=\"flex:1;height:28px;background:#f0ece3;border-radius:6px;overflow:hidden;\"><div style=\"width:76%;height:100%;background:#d4334a;border-radius:6px;\"><\u002Fdiv><\u002Fdiv>\n            <div style=\"width:130px;flex:none;font-size:13px;color:#5a6470;\">16 morti · 9 anni<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:14px;\">\n            <div style=\"width:170px;flex:none;font-size:14px;font-weight:600;color:#13283f;text-align:right;\">Via Tiburtina<\u002Fdiv>\n            <div style=\"flex:1;height:28px;background:#f0ece3;border-radius:6px;overflow:hidden;\"><div style=\"width:76%;height:100%;background:#c4112f;border-radius:6px;opacity:.85;\"><\u002Fdiv><\u002Fdiv>\n            <div style=\"width:130px;flex:none;font-size:13px;color:#5a6470;\">16 morti · 10 anni<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:14px;\">\n            <div style=\"width:170px;flex:none;font-size:14px;font-weight:600;color:#13283f;text-align:right;\">Via Prenestina<\u002Fdiv>\n            <div style=\"flex:1;height:28px;background:#f0ece3;border-radius:6px;overflow:hidden;\"><div style=\"width:76%;height:100%;background:#c4112f;border-radius:6px;opacity:.85;\"><\u002Fdiv><\u002Fdiv>\n            <div style=\"width:130px;flex:none;font-size:13px;color:#5a6470;\">16 morti · 10 anni<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:14px;\">\n            <div style=\"width:170px;flex:none;font-size:14px;font-weight:600;color:#13283f;text-align:right;\">Via C. Colombo<\u002Fdiv>\n            <div style=\"flex:1;height:28px;background:#f0ece3;border-radius:6px;overflow:hidden;\"><div style=\"width:76%;height:100%;background:#c4112f;border-radius:6px;opacity:.85;\"><\u002Fdiv><\u002Fdiv>\n            <div style=\"width:130px;flex:none;font-size:13px;color:#5a6470;\">16 morti · 10 anni<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:14px;\">\n            <div style=\"width:170px;flex:none;font-size:14px;font-weight:600;color:#13283f;text-align:right;\">Via Nomentana<\u002Fdiv>\n            <div style=\"flex:1;height:28px;background:#f0ece3;border-radius:6px;overflow:hidden;\"><div style=\"width:62%;height:100%;background:#d4334a;border-radius:6px;opacity:.7;\"><\u002Fdiv><\u002Fdiv>\n            <div style=\"width:130px;flex:none;font-size:13px;color:#5a6470;\">13 morti · 9 anni<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:14px;\">\n            <div style=\"width:170px;flex:none;font-size:14px;font-weight:600;color:#13283f;text-align:right;\">Via Cassia<\u002Fdiv>\n            <div style=\"flex:1;height:28px;background:#f0ece3;border-radius:6px;overflow:hidden;\"><div style=\"width:62%;height:100%;background:#c4112f;border-radius:6px;opacity:.75;\"><\u002Fdiv><\u002Fdiv>\n            <div style=\"width:130px;flex:none;font-size:13px;color:#5a6470;\">13 morti · 10 anni<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:14px;\">\n            <div style=\"width:170px;flex:none;font-size:14px;font-weight:600;color:#13283f;text-align:right;\">Vle P. Togliatti<\u002Fdiv>\n            <div style=\"flex:1;height:28px;background:#f0ece3;border-radius:6px;overflow:hidden;\"><div style=\"width:57%;height:100%;background:#de5060;border-radius:6px;\"><\u002Fdiv><\u002Fdiv>\n            <div style=\"width:130px;flex:none;font-size:13px;color:#5a6470;\">12 morti · 8 anni<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:14px;\">\n            <div style=\"width:170px;flex:none;font-size:14px;color:#13283f;text-align:right;\">Via Ostiense<\u002Fdiv>\n            <div style=\"flex:1;height:28px;background:#f0ece3;border-radius:6px;overflow:hidden;\"><div style=\"width:43%;height:100%;background:#de5060;border-radius:6px;opacity:.8;\"><\u002Fdiv><\u002Fdiv>\n            <div style=\"width:130px;flex:none;font-size:13px;color:#5a6470;\">9 morti · 8 anni<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:14px;\">\n            <div style=\"width:170px;flex:none;font-size:14px;color:#13283f;text-align:right;\">Via Di Boccea<\u002Fdiv>\n            <div style=\"flex:1;height:28px;background:#f0ece3;border-radius:6px;overflow:hidden;\"><div style=\"width:43%;height:100%;background:#e87888;border-radius:6px;\"><\u002Fdiv><\u002Fdiv>\n            <div style=\"width:130px;flex:none;font-size:13px;color:#5a6470;\">9 morti · 7 anni<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:14px;\">\n            <div style=\"width:170px;flex:none;font-size:14px;color:#13283f;text-align:right;\">Via Anagnina<\u002Fdiv>\n            <div style=\"flex:1;height:28px;background:#f0ece3;border-radius:6px;overflow:hidden;\"><div style=\"width:43%;height:100%;background:#e87888;border-radius:6px;\"><\u002Fdiv><\u002Fdiv>\n            <div style=\"width:130px;flex:none;font-size:13px;color:#5a6470;\">9 morti · 7 anni<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:14px;\">\n            <div style=\"width:170px;flex:none;font-size:14px;color:#13283f;text-align:right;\">Via Aurelia<\u002Fdiv>\n            <div style=\"flex:1;height:28px;background:#f0ece3;border-radius:6px;overflow:hidden;\"><div style=\"width:38%;height:100%;background:#f0a0aa;border-radius:6px;\"><\u002Fdiv><\u002Fdiv>\n            <div style=\"width:130px;flex:none;font-size:13px;color:#5a6470;\">8 morti · 6 anni<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"background:#13283f;color:#fff;border-radius:14px;padding:28px 30px;margin-bottom:18px;\">\n        <h4 style=\"font-family:'Archivo',sans-serif;font-weight:700;font-size:17px;color:#e8a9b2;margin:0 0 8px;\">Via Casilina: 21 pedoni morti in 11 anni su 15<\u002Fh4>\n        <p style=\"font-size:16px;line-height:1.6;margin:0;color:#cdd9e6;\">Non è un'annata sfortunata: è una strada che uccide pedoni <strong style=\"color:#fff;\">quasi ogni anno dal 2008<\u002Fstrong>. Dietro di lei la stessa lista: Colombo, Prenestina, Tiburtina, Tuscolana, Cassia, Nomentana, Togliatti. Le <strong style=\"color:#fff;\">consolari trasformate in tangenziali urbane<\u002Fstrong>. La geografia del rischio pedonale a Roma non è cambiata in quindici anni. È conosciuta e stabile: il che la rende un bersaglio ideale per interventi mirati.<\u002Fp>\n      <\u002Fdiv>\n\n      <h3 style=\"font-family:'Archivo',sans-serif;font-weight:700;font-size:18px;color:#13283f;margin:28px 0 12px;\">Le 12 strade con più morti pedoni, 2008-2022<\u002Fh3>\n      <div style=\"overflow-x:auto;-webkit-overflow-scrolling:touch;border:1px solid #ece6db;border-radius:14px;box-shadow:0 1px 2px rgba(19,40,63,.05);\">\n        <table style=\"border-collapse:collapse;width:100%;min-width:520px;font-size:15px;background:#fff;\">\n          <thead><tr style=\"background:#13283f;color:#fff;\">\n            <th style=\"text-align:left;padding:14px 18px;font-family:'Archivo';font-weight:700;font-size:13.5px;\">Strada<\u002Fth>\n            <th style=\"text-align:center;padding:14px 18px;font-family:'Archivo';font-weight:700;font-size:13.5px;\">Pedoni morti<\u002Fth>\n            <th style=\"text-align:center;padding:14px 18px;font-family:'Archivo';font-weight:700;font-size:13.5px;\">Anni distinti<\u002Fth>\n            <th style=\"text-align:center;padding:14px 18px;font-family:'Archivo';font-weight:700;font-size:13.5px;\">Dal<\u002Fth>\n            <th style=\"text-align:center;padding:14px 18px;font-family:'Archivo';font-weight:700;font-size:13.5px;\">Al<\u002Fth>\n          <\u002Ftr><\u002Fthead>\n          <tbody>\n            <tr style=\"border-bottom:1px solid #f0ece3;\"><td style=\"padding:12px 18px;font-weight:600;color:#c4112f;\">Via Casilina<\u002Ftd><td style=\"text-align:center;padding:12px 18px;font-family:'Archivo';font-weight:800;color:#c4112f;\">21<\u002Ftd><td style=\"text-align:center;padding:12px 18px;\">11<\u002Ftd><td style=\"text-align:center;padding:12px 18px;color:#7d8794;\">2008<\u002Ftd><td style=\"text-align:center;padding:12px 18px;color:#7d8794;\">2022<\u002Ftd><\u002Ftr>\n            <tr style=\"border-bottom:1px solid #f0ece3;background:#faf8f4;\"><td style=\"padding:12px 18px;\">Via Cristoforo Colombo<\u002Ftd><td style=\"text-align:center;padding:12px 18px;font-family:'Archivo';font-weight:800;\">16<\u002Ftd><td style=\"text-align:center;padding:12px 18px;\">10<\u002Ftd><td style=\"text-align:center;padding:12px 18px;color:#7d8794;\">2008<\u002Ftd><td style=\"text-align:center;padding:12px 18px;color:#7d8794;\">2018<\u002Ftd><\u002Ftr>\n            <tr style=\"border-bottom:1px solid #f0ece3;\"><td style=\"padding:12px 18px;\">Via Prenestina<\u002Ftd><td style=\"text-align:center;padding:12px 18px;font-family:'Archivo';font-weight:800;\">16<\u002Ftd><td style=\"text-align:center;padding:12px 18px;\">10<\u002Ftd><td style=\"text-align:center;padding:12px 18px;color:#7d8794;\">2008<\u002Ftd><td style=\"text-align:center;padding:12px 18px;color:#7d8794;\">2022<\u002Ftd><\u002Ftr>\n            <tr style=\"border-bottom:1px solid #f0ece3;background:#faf8f4;\"><td style=\"padding:12px 18px;\">Via Tiburtina<\u002Ftd><td style=\"text-align:center;padding:12px 18px;font-family:'Archivo';font-weight:800;\">16<\u002Ftd><td style=\"text-align:center;padding:12px 18px;\">10<\u002Ftd><td style=\"text-align:center;padding:12px 18px;color:#7d8794;\">2008<\u002Ftd><td style=\"text-align:center;padding:12px 18px;color:#7d8794;\">2022<\u002Ftd><\u002Ftr>\n            <tr style=\"border-bottom:1px solid #f0ece3;\"><td style=\"padding:12px 18px;\">Via Tuscolana<\u002Ftd><td style=\"text-align:center;padding:12px 18px;font-family:'Archivo';font-weight:800;\">16<\u002Ftd><td style=\"text-align:center;padding:12px 18px;\">9<\u002Ftd><td style=\"text-align:center;padding:12px 18px;color:#7d8794;\">2009<\u002Ftd><td style=\"text-align:center;padding:12px 18px;color:#7d8794;\">2020<\u002Ftd><\u002Ftr>\n            <tr style=\"border-bottom:1px solid #f0ece3;background:#faf8f4;\"><td style=\"padding:12px 18px;\">Via Cassia<\u002Ftd><td style=\"text-align:center;padding:12px 18px;font-family:'Archivo';font-weight:800;\">13<\u002Ftd><td style=\"text-align:center;padding:12px 18px;\">10<\u002Ftd><td style=\"text-align:center;padding:12px 18px;color:#7d8794;\">2008<\u002Ftd><td style=\"text-align:center;padding:12px 18px;color:#7d8794;\">2022<\u002Ftd><\u002Ftr>\n            <tr style=\"border-bottom:1px solid #f0ece3;\"><td style=\"padding:12px 18px;\">Via Nomentana<\u002Ftd><td style=\"text-align:center;padding:12px 18px;font-family:'Archivo';font-weight:800;\">13<\u002Ftd><td style=\"text-align:center;padding:12px 18px;\">9<\u002Ftd><td style=\"text-align:center;padding:12px 18px;color:#7d8794;\">2008<\u002Ftd><td style=\"text-align:center;padding:12px 18px;color:#7d8794;\">2021<\u002Ftd><\u002Ftr>\n            <tr style=\"border-bottom:1px solid #f0ece3;background:#faf8f4;\"><td style=\"padding:12px 18px;\">Viale Palmiro Togliatti<\u002Ftd><td style=\"text-align:center;padding:12px 18px;font-family:'Archivo';font-weight:800;\">12<\u002Ftd><td style=\"text-align:center;padding:12px 18px;\">8<\u002Ftd><td style=\"text-align:center;padding:12px 18px;color:#7d8794;\">2008<\u002Ftd><td style=\"text-align:center;padding:12px 18px;color:#7d8794;\">2021<\u002Ftd><\u002Ftr>\n            <tr style=\"border-bottom:1px solid #f0ece3;\"><td style=\"padding:12px 18px;\">Via Ostiense<\u002Ftd><td style=\"text-align:center;padding:12px 18px;font-family:'Archivo';font-weight:800;\">9<\u002Ftd><td style=\"text-align:center;padding:12px 18px;\">8<\u002Ftd><td style=\"text-align:center;padding:12px 18px;color:#7d8794;\">2009<\u002Ftd><td style=\"text-align:center;padding:12px 18px;color:#7d8794;\">2022<\u002Ftd><\u002Ftr>\n            <tr style=\"border-bottom:1px solid #f0ece3;background:#faf8f4;\"><td style=\"padding:12px 18px;\">Via Di Boccea<\u002Ftd><td style=\"text-align:center;padding:12px 18px;font-family:'Archivo';font-weight:800;\">9<\u002Ftd><td style=\"text-align:center;padding:12px 18px;\">7<\u002Ftd><td style=\"text-align:center;padding:12px 18px;color:#7d8794;\">2009<\u002Ftd><td style=\"text-align:center;padding:12px 18px;color:#7d8794;\">2018<\u002Ftd><\u002Ftr>\n            <tr style=\"border-bottom:1px solid #f0ece3;\"><td style=\"padding:12px 18px;\">Via Anagnina<\u002Ftd><td style=\"text-align:center;padding:12px 18px;font-family:'Archivo';font-weight:800;\">9<\u002Ftd><td style=\"text-align:center;padding:12px 18px;\">7<\u002Ftd><td style=\"text-align:center;padding:12px 18px;color:#7d8794;\">2009<\u002Ftd><td style=\"text-align:center;padding:12px 18px;color:#7d8794;\">2021<\u002Ftd><\u002Ftr>\n            <tr><td style=\"padding:12px 18px;\">Via Aurelia<\u002Ftd><td style=\"text-align:center;padding:12px 18px;font-family:'Archivo';font-weight:800;\">8<\u002Ftd><td style=\"text-align:center;padding:12px 18px;\">6<\u002Ftd><td style=\"text-align:center;padding:12px 18px;color:#7d8794;\">2008<\u002Ftd><td style=\"text-align:center;padding:12px 18px;color:#7d8794;\">2020<\u002Ftd><\u002Ftr>\n          <\u002Ftbody>\n        <\u002Ftable>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- 03 -->\n    <section data-screen-label=\"03 Lockdown 2020\" style=\"margin-top:64px;\">\n      <div style=\"display:flex;align-items:center;gap:16px;margin-bottom:10px;\">\n        <span style=\"font-family:'Archivo',sans-serif;font-weight:800;font-size:15px;color:#c4112f;letter-spacing:.06em;\">03<\u002Fspan>\n        <span style=\"flex:1;height:2px;background:#e2dccf;\"><\u002Fspan>\n      <\u002Fdiv>\n      <h2 style=\"font-family:'Archivo',sans-serif;font-weight:800;font-size:clamp(24px,4.8vw,34px);line-height:1.1;color:#13283f;margin:0 0 18px;letter-spacing:-.015em;\">L'esperimento naturale: il lockdown 2020<\u002Fh2>\n      <p style=\"font-size:17px;line-height:1.65;max-width:68ch;margin:0 0 16px;\">La primavera 2020 è il test più pulito che una città possa offrire sull'ipotesi <em>«contano la velocità e lo spazio, non il volume di traffico»<\u002Fem>. Le strade vuote hanno permesso di andare più veloce. Se l'ipotesi è giusta, ci aspettiamo <strong>pochi incidenti ma più letali<\u002Fstrong>.<\u002Fp>\n      <p style=\"font-size:17px;line-height:1.65;max-width:68ch;margin:0 0 24px;\">Nei tre mesi del lockdown (<strong>marzo-maggio 2020<\u002Fstrong>) gli incidenti sono crollati del <strong>65%<\u002Fstrong> rispetto allo stesso trimestre 2019. La mortalità pedonale è però <strong>salita<\u002Fstrong>: dal <strong>2,2%<\u002Fstrong> al <strong>4,1%<\u002Fstrong>.<\u002Fp>\n\n      <!-- CHART 3: stat comparison -->\n      <div style=\"background:#fff;border:1px solid #ece6db;border-radius:14px;padding:28px 30px;box-shadow:0 1px 2px rgba(19,40,63,.05);\">\n        <div style=\"font-family:'Archivo',sans-serif;font-weight:700;font-size:15px;color:#13283f;margin-bottom:6px;\">Volume: il lockdown svuota le strade<\u002Fdiv>\n        <div style=\"font-size:13px;color:#7d8794;margin-bottom:20px;\">Incidenti medi mensili — mar-mag 2019 vs mar-mag 2020<\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:14px;margin-bottom:28px;\">\n          <div style=\"display:flex;align-items:center;gap:16px;\">\n            <div style=\"width:140px;flex:none;font-size:14px;font-weight:600;color:#13283f;\">Mar-Mag 2019<\u002Fdiv>\n            <div style=\"flex:1;height:34px;background:#f0ece3;border-radius:7px;overflow:hidden;\"><div style=\"width:100%;height:100%;background:#13283f;border-radius:7px;display:flex;align-items:center;padding-left:14px;\"><span style=\"color:#fff;font-family:'Archivo';font-weight:700;font-size:14px;\">circa 2.700 inc./mese<\u002Fspan><\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:16px;\">\n            <div style=\"width:140px;flex:none;font-size:14px;font-weight:700;color:#c4112f;\">Mar-Mag 2020<\u002Fdiv>\n            <div style=\"flex:1;height:34px;background:#f0ece3;border-radius:7px;overflow:hidden;\"><div style=\"width:35%;height:100%;background:#c4112f;border-radius:7px;display:flex;align-items:center;padding-left:14px;\"><span style=\"color:#fff;font-family:'Archivo';font-weight:700;font-size:14px;\">~630<\u002Fspan><\u002Fdiv><\u002Fdiv>\n            <div style=\"font-family:'Archivo';font-weight:800;font-size:20px;color:#c4112f;flex:none;\">-65%<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"font-family:'Archivo',sans-serif;font-weight:700;font-size:15px;color:#13283f;margin-bottom:16px;padding-top:22px;border-top:1px solid #ece6db;\">Lettalita: ma per i pedoni ogni incidente diventa piu mortale<\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:16px;\">\n          <div style=\"background:#f4f1ea;border-radius:12px;padding:20px 22px;\">\n            <div style=\"font-size:12px;text-transform:uppercase;letter-spacing:.1em;color:#7d8794;font-weight:700;margin-bottom:10px;\">Normale (2019)<\u002Fdiv>\n            <div style=\"font-family:'Archivo',sans-serif;font-weight:900;font-size:40px;line-height:1;color:#13283f;\">2,2%<\u002Fdiv>\n            <div style=\"font-size:13.5px;color:#7d8794;margin-top:6px;\">mortalita pedonale per incidente<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"background:#fbe9ec;border-radius:12px;padding:20px 22px;border:1px solid #f1c4cc;\">\n            <div style=\"font-size:12px;text-transform:uppercase;letter-spacing:.1em;color:#c4112f;font-weight:700;margin-bottom:10px;\">Lockdown (Apr-Mag 2020)<\u002Fdiv>\n            <div style=\"font-family:'Archivo',sans-serif;font-weight:900;font-size:40px;line-height:1;color:#c4112f;\">4,1%<\u002Fdiv>\n            <div style=\"font-size:13.5px;color:#c4112f;margin-top:6px;\">il doppio rispetto al normale<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;align-items:center;gap:18px;margin-top:22px;padding-top:20px;border-top:1px solid #ece6db;\">\n          <div style=\"font-family:'Archivo';font-weight:900;font-size:44px;line-height:1;color:#c4112f;flex:none;\">2,5x<\u002Fdiv>\n          <div style=\"font-size:15.5px;line-height:1.55;color:#3f4954;\">Meno incidenti, ma ogni incidente con un pedone è quasi tre volte più letale. La velocità, non il volume, è il fattore determinante.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"background:#fdf6ec;border:1px solid #f3e3c6;border-left:4px solid #e0922f;border-radius:14px;padding:20px 26px;margin-top:18px;font-size:15.5px;line-height:1.6;color:#5a4a32;\">\n        <strong style=\"color:#3f3320;\">Numeri piccoli, segnale coerente.<\u002Fstrong> Ad aprile 2020 appena 22 incidenti con pedoni, quindi i tassi mensili sono molto rumorosi. Va letta la <strong>direzione<\u002Fstrong>, non il valore puntuale: meno incidenti ma sistematicamente più letali, esattamente ciò che prevede l'ipotesi della velocità.\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- PARTE II -->\n    <div style=\"display:inline-block;font-family:'Archivo',sans-serif;font-weight:700;font-size:12.5px;letter-spacing:.18em;text-transform:uppercase;color:#7d8794;margin-top:64px;border-top:2px solid #e2dccf;padding-top:14px;\">Parte II - L'azione<\u002Fdiv>\n\n    <!-- 04 -->\n    <section data-screen-label=\"04 Punti da riprogettare\" style=\"margin-top:40px;\">\n      <div style=\"display:flex;align-items:center;gap:16px;margin-bottom:10px;\">\n        <span style=\"font-family:'Archivo',sans-serif;font-weight:800;font-size:15px;color:#c4112f;letter-spacing:.06em;\">04<\u002Fspan>\n        <span style=\"flex:1;height:2px;background:#e2dccf;\"><\u002Fspan>\n      <\u002Fdiv>\n      <h2 style=\"font-family:'Archivo',sans-serif;font-weight:800;font-size:clamp(24px,4.8vw,34px);line-height:1.1;color:#13283f;margin:0 0 18px;letter-spacing:-.015em;\">Dove esattamente intervenire: i punti da riprogettare<\u002Fh2>\n      <p style=\"font-size:17px;line-height:1.65;max-width:68ch;margin:0 0 22px;\">\"Riprogettare Via Casilina\" non è un'indicazione operativa: la Casilina è lunga chilometri. Usando le coordinate disponibili dal 2014, possiamo scendere al <strong>singolo tratto di 250 metri<\u002Fstrong> e individuare i punti che concentrano incidenti e morti pedonali.<\u002Fp>\n\n      <h3 style=\"font-family:'Archivo',sans-serif;font-weight:700;font-size:18px;color:#13283f;margin:0 0 12px;\">Tratti di 250 m che concentrano gli incidenti pedonali, 2014-2022<\u002Fh3>\n      <div style=\"overflow-x:auto;-webkit-overflow-scrolling:touch;border:1px solid #ece6db;border-radius:14px;box-shadow:0 1px 2px rgba(19,40,63,.05);margin-bottom:22px;\">\n        <table style=\"border-collapse:collapse;width:100%;min-width:580px;font-size:15px;background:#fff;\">\n          <thead><tr style=\"background:#13283f;color:#fff;\">\n            <th style=\"text-align:left;padding:14px 18px;font-family:'Archivo';font-weight:700;font-size:13.5px;\">Corridoio<\u002Fth>\n            <th style=\"text-align:left;padding:14px 18px;font-family:'Archivo';font-weight:700;font-size:13.5px;\">Punto critico<\u002Fth>\n            <th style=\"text-align:center;padding:14px 18px;font-family:'Archivo';font-weight:700;font-size:13.5px;\">Incidenti pedoni<\u002Fth>\n            <th style=\"text-align:center;padding:14px 18px;font-family:'Archivo';font-weight:700;font-size:13.5px;\">Morti<\u002Fth>\n          <\u002Ftr><\u002Fthead>\n          <tbody>\n            <tr style=\"border-bottom:1px solid #f0ece3;\"><td style=\"padding:12px 18px;font-weight:600;color:#c4112f;\">Via Casilina<\u002Ftd><td style=\"padding:12px 18px;color:#5a6470;\">x Via Carlo Santarelli<\u002Ftd><td style=\"text-align:center;padding:12px 18px;font-family:'Archivo';font-weight:800;\">34<\u002Ftd><td style=\"text-align:center;padding:12px 18px;font-family:'Archivo';font-weight:800;color:#c4112f;\">3<\u002Ftd><\u002Ftr>\n            <tr style=\"border-bottom:1px solid #f0ece3;background:#faf8f4;\"><td style=\"padding:12px 18px;font-weight:600;color:#c4112f;\">Via Tiburtina<\u002Ftd><td style=\"padding:12px 18px;color:#5a6470;\">x Via Di Portonaccio<\u002Ftd><td style=\"text-align:center;padding:12px 18px;font-family:'Archivo';font-weight:800;\">30<\u002Ftd><td style=\"text-align:center;padding:12px 18px;font-family:'Archivo';font-weight:800;color:#c4112f;\">3<\u002Ftd><\u002Ftr>\n            <tr style=\"border-bottom:1px solid #f0ece3;\"><td style=\"padding:12px 18px;font-weight:600;\">Via Ostiense<\u002Ftd><td style=\"padding:12px 18px;color:#5a6470;\">x Via Del Porto Fluviale<\u002Ftd><td style=\"text-align:center;padding:12px 18px;font-family:'Archivo';font-weight:800;\">23<\u002Ftd><td style=\"text-align:center;padding:12px 18px;font-family:'Archivo';font-weight:800;color:#c4112f;\">2<\u002Ftd><\u002Ftr>\n            <tr style=\"border-bottom:1px solid #f0ece3;background:#faf8f4;\"><td style=\"padding:12px 18px;font-weight:600;\">Via Prenestina<\u002Ftd><td style=\"padding:12px 18px;color:#5a6470;\">x Largo Preneste<\u002Ftd><td style=\"text-align:center;padding:12px 18px;font-family:'Archivo';font-weight:800;\">17<\u002Ftd><td style=\"text-align:center;padding:12px 18px;font-family:'Archivo';font-weight:800;color:#c4112f;\">3<\u002Ftd><\u002Ftr>\n            <tr style=\"border-bottom:1px solid #f0ece3;\"><td style=\"padding:12px 18px;\">Via Tuscolana<\u002Ftd><td style=\"padding:12px 18px;color:#5a6470;\">x Via Veturia<\u002Ftd><td style=\"text-align:center;padding:12px 18px;font-family:'Archivo';font-weight:800;\">25<\u002Ftd><td style=\"text-align:center;padding:12px 18px;font-family:'Archivo';font-weight:800;\">1<\u002Ftd><\u002Ftr>\n            <tr style=\"border-bottom:1px solid #f0ece3;background:#faf8f4;\"><td style=\"padding:12px 18px;\">Viale P. Togliatti<\u002Ftd><td style=\"padding:12px 18px;color:#5a6470;\">x Via Dei Sesami<\u002Ftd><td style=\"text-align:center;padding:12px 18px;font-family:'Archivo';font-weight:800;\">12<\u002Ftd><td style=\"text-align:center;padding:12px 18px;font-family:'Archivo';font-weight:800;color:#c4112f;\">3<\u002Ftd><\u002Ftr>\n            <tr style=\"border-bottom:1px solid #f0ece3;\"><td style=\"padding:12px 18px;\">Via Tiburtina<\u002Ftd><td style=\"padding:12px 18px;color:#5a6470;\">x Via Diego Angeli<\u002Ftd><td style=\"text-align:center;padding:12px 18px;font-family:'Archivo';font-weight:800;\">16<\u002Ftd><td style=\"text-align:center;padding:12px 18px;font-family:'Archivo';font-weight:800;\">1<\u002Ftd><\u002Ftr>\n            <tr style=\"border-bottom:1px solid #f0ece3;background:#faf8f4;\"><td style=\"padding:12px 18px;\">Via Tiburtina<\u002Ftd><td style=\"padding:12px 18px;color:#5a6470;\">x Via Vincenzo Morello<\u002Ftd><td style=\"text-align:center;padding:12px 18px;font-family:'Archivo';font-weight:800;\">15<\u002Ftd><td style=\"text-align:center;padding:12px 18px;font-family:'Archivo';font-weight:800;\">1<\u002Ftd><\u002Ftr>\n            <tr><td style=\"padding:12px 18px;\">Via Casilina<\u002Ftd><td style=\"padding:12px 18px;color:#5a6470;\">x Via Di Tor Pignattara<\u002Ftd><td style=\"text-align:center;padding:12px 18px;font-family:'Archivo';font-weight:800;\">12<\u002Ftd><td style=\"text-align:center;padding:12px 18px;font-family:'Archivo';font-weight:800;\">1<\u002Ftd><\u002Ftr>\n          <\u002Ftbody>\n        <\u002Ftable>\n      <\u002Fdiv>\n\n      <h3 style=\"font-family:'Archivo',sans-serif;font-weight:700;font-size:18px;color:#13283f;margin:0 0 10px;\">Mappa degli hotspot sui corridoi cronici<\u002Fh3>\n      <p style=\"color:#7d8794;font-size:14.5px;line-height:1.6;margin:0 0 14px;max-width:70ch;\">Dimensione del cerchio = numero di incidenti pedonali nel tratto; colore = rosso scuro se 2 o più morti, arancio se 1 morto.<\u002Fp>\n      <div id=\"map-hotspots\" style=\"width:100%;height:500px;border-radius:16px;border:1px solid #ece6db;overflow:hidden;box-shadow:0 1px 2px rgba(19,40,63,.05);\"><\u002Fdiv>\n      <div style=\"display:flex;gap:24px;margin-top:14px;font-size:13.5px;color:#7d8794;\">\n        <span style=\"display:inline-flex;align-items:center;gap:8px;\"><span style=\"width:12px;height:12px;border-radius:50%;background:#c4112f;\"><\u002Fspan> 2 o piu morti<\u002Fspan>\n        <span style=\"display:inline-flex;align-items:center;gap:8px;\"><span style=\"width:12px;height:12px;border-radius:50%;background:#d87130;\"><\u002Fspan> 1 morto<\u002Fspan>\n      <\u002Fdiv>\n\n      <div style=\"background:#fff;border:1px solid #ece6db;border-left:4px solid #c4112f;border-radius:14px;padding:22px 26px;margin-top:22px;box-shadow:0 1px 2px rgba(19,40,63,.05);\">\n        <h4 style=\"font-family:'Archivo',sans-serif;font-weight:700;font-size:17px;color:#13283f;margin:0 0 8px;\">Sei indirizzi concreti per iniziare<\u002Fh4>\n        <p style=\"font-size:16px;line-height:1.6;margin:0;color:#3f4954;\"><strong>Casilina presso Via Carlo Santarelli<\u002Fstrong>, <strong>Tiburtina presso Via di Portonaccio<\u002Fstrong>, <strong>Prenestina presso Largo Preneste<\u002Fstrong>, <strong>Togliatti presso Via dei Sesami<\u002Fstrong>, <strong>Ostiense presso Via del Porto Fluviale<\u002Fstrong> e <strong>Tuscolana presso Via Veturia<\u002Fstrong>. Non sono astrazioni: sono incroci precisi, ognuno con un nome, su cui si può intervenire e poi <em>misurare<\u002Fem>.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- 05 -->\n    <section data-screen-label=\"05 Interventi che i dati rivelano\" style=\"margin-top:64px;\">\n      <div style=\"display:flex;align-items:center;gap:16px;margin-bottom:10px;\">\n        <span style=\"font-family:'Archivo',sans-serif;font-weight:800;font-size:15px;color:#c4112f;letter-spacing:.06em;\">05<\u002Fspan>\n        <span style=\"flex:1;height:2px;background:#e2dccf;\"><\u002Fspan>\n      <\u002Fdiv>\n      <h2 style=\"font-family:'Archivo',sans-serif;font-weight:800;font-size:clamp(24px,4.8vw,34px);line-height:1.1;color:#13283f;margin:0 0 18px;letter-spacing:-.015em;\">Gli interventi che i dati rivelano<\u002Fh2>\n      <p style=\"font-size:17px;line-height:1.65;max-width:68ch;margin:0 0 22px;\">Roma <strong>non pubblica<\u002Fstrong> un registro degli interventi. Ma alcuni lasciano un'impronta inconfondibile nei dati. Una strada <strong>chiusa al traffico<\u002Fstrong> vede i propri incidenti crollare verso lo zero.<\u002Fp>\n\n      <h3 style=\"font-family:'Archivo',sans-serif;font-weight:700;font-size:21px;color:#13283f;margin:0 0 12px;\">Il caso positivo: Via dei Fori Imperiali (chiusa nel 2013)<\u002Fh3>\n      <p style=\"font-size:17px;line-height:1.65;max-width:68ch;margin:0 0 18px;\">Nel 2013 Via dei Fori Imperiali è stata chiusa al traffico privato. L'effetto nei dati è netto e <strong>permanente<\u002Fstrong>: gli incidenti passano da una media di <strong>24,6 all'anno<\u002Fstrong> (2008-2012) a <strong>4,6<\u002Fstrong> (2014-2021), un calo dell'<strong>81%<\u002Fstrong>. Non un picco isolato: la strada resta tranquilla per otto anni di fila.<\u002Fp>\n\n      <!-- CHART 4: before/after bar chart SVG -->\n      <div style=\"background:#fff;border:1px solid #ece6db;border-radius:14px;padding:28px 30px;box-shadow:0 1px 2px rgba(19,40,63,.05);margin-bottom:18px;\">\n        <div style=\"font-family:'Archivo',sans-serif;font-weight:700;font-size:15px;color:#13283f;margin-bottom:4px;\">Via dei Fori Imperiali: cosa succede quando si tolgono le auto<\u002Fdiv>\n        <div style=\"font-size:13px;color:#7d8794;margin-bottom:18px;\">Gli incidenti crollano dell'81% e restano bassi per otto anni<\u002Fdiv>\n        <svg viewBox=\"0 0 760 280\" style=\"width:100%;display:block;\" xmlns=\"http://www.w3.org/2000/svg\">\n          <!-- after zone background -->\n          <rect x=\"346\" y=\"20\" width=\"404\" height=\"210\" fill=\"rgba(61,139,61,0.06)\" rx=\"4\"><\u002Frect>\n          <!-- gridlines -->\n          <line x1=\"50\" y1=\"20\" x2=\"740\" y2=\"20\" stroke=\"#e8e4db\" stroke-width=\"1\"><\u002Fline>\n          <line x1=\"50\" y1=\"78\" x2=\"740\" y2=\"78\" stroke=\"#e8e4db\" stroke-width=\"1\"><\u002Fline>\n          <line x1=\"50\" y1=\"137\" x2=\"740\" y2=\"137\" stroke=\"#e8e4db\" stroke-width=\"1\"><\u002Fline>\n          <line x1=\"50\" y1=\"195\" x2=\"740\" y2=\"195\" stroke=\"#e8e4db\" stroke-width=\"1\"><\u002Fline>\n          <line x1=\"50\" y1=\"230\" x2=\"740\" y2=\"230\" stroke=\"#e8e4db\" stroke-width=\"1\"><\u002Fline>\n          <!-- y-axis labels -->\n          <text x=\"44\" y=\"24\" text-anchor=\"end\" font-family=\"Libre Franklin,sans-serif\" font-size=\"11\" fill=\"#9aa3ad\">35<\u002Ftext>\n          <text x=\"44\" y=\"82\" text-anchor=\"end\" font-family=\"Libre Franklin,sans-serif\" font-size=\"11\" fill=\"#9aa3ad\">25<\u002Ftext>\n          <text x=\"44\" y=\"141\" text-anchor=\"end\" font-family=\"Libre Franklin,sans-serif\" font-size=\"11\" fill=\"#9aa3ad\">15<\u002Ftext>\n          <text x=\"44\" y=\"199\" text-anchor=\"end\" font-family=\"Libre Franklin,sans-serif\" font-size=\"11\" fill=\"#9aa3ad\">5<\u002Ftext>\n          <text x=\"44\" y=\"234\" text-anchor=\"end\" font-family=\"Libre Franklin,sans-serif\" font-size=\"11\" fill=\"#9aa3ad\">0<\u002Ftext>\n          <!-- BEFORE bars (navy) -->\n          <!-- 2008: 34 → h=199 y_top=31 -->\n          <rect x=\"57\" y=\"31\" width=\"36\" height=\"199\" fill=\"#13283f\" rx=\"3\"><\u002Frect>\n          <text x=\"75\" y=\"26\" text-anchor=\"middle\" font-family=\"Archivo,sans-serif\" font-size=\"11\" font-weight=\"700\" fill=\"#13283f\">34<\u002Ftext>\n          <!-- 2009: 20 → h=117 y_top=113 -->\n          <rect x=\"106\" y=\"113\" width=\"36\" height=\"117\" fill=\"#13283f\" rx=\"3\"><\u002Frect>\n          <text x=\"124\" y=\"108\" text-anchor=\"middle\" font-family=\"Archivo,sans-serif\" font-size=\"11\" font-weight=\"700\" fill=\"#13283f\">20<\u002Ftext>\n          <!-- 2010: 26 → h=152 y_top=78 -->\n          <rect x=\"155\" y=\"78\" width=\"36\" height=\"152\" fill=\"#13283f\" rx=\"3\"><\u002Frect>\n          <text x=\"173\" y=\"73\" text-anchor=\"middle\" font-family=\"Archivo,sans-serif\" font-size=\"11\" font-weight=\"700\" fill=\"#13283f\">26<\u002Ftext>\n          <!-- 2011: 22 → h=128 y_top=102 -->\n          <rect x=\"204\" y=\"102\" width=\"36\" height=\"128\" fill=\"#13283f\" rx=\"3\"><\u002Frect>\n          <text x=\"222\" y=\"97\" text-anchor=\"middle\" font-family=\"Archivo,sans-serif\" font-size=\"11\" font-weight=\"700\" fill=\"#13283f\">22<\u002Ftext>\n          <!-- 2012: 21 → h=123 y_top=107 -->\n          <rect x=\"253\" y=\"107\" width=\"36\" height=\"123\" fill=\"#13283f\" rx=\"3\"><\u002Frect>\n          <text x=\"271\" y=\"102\" text-anchor=\"middle\" font-family=\"Archivo,sans-serif\" font-size=\"11\" font-weight=\"700\" fill=\"#13283f\">21<\u002Ftext>\n          <!-- 2013: 24 → h=140 y_top=90 -->\n          <rect x=\"302\" y=\"90\" width=\"36\" height=\"140\" fill=\"#13283f\" rx=\"3\"><\u002Frect>\n          <text x=\"320\" y=\"85\" text-anchor=\"middle\" font-family=\"Archivo,sans-serif\" font-size=\"11\" font-weight=\"700\" fill=\"#13283f\">24<\u002Ftext>\n          <!-- Chiusura line -->\n          <line x1=\"346\" y1=\"16\" x2=\"346\" y2=\"234\" stroke=\"#3d8b3d\" stroke-width=\"1.5\" stroke-dasharray=\"5,4\"><\u002Fline>\n          <text x=\"352\" y=\"36\" font-family=\"Archivo,sans-serif\" font-size=\"11\" font-weight=\"700\" fill=\"#3d8b3d\">chiusura al<\u002Ftext>\n          <text x=\"352\" y=\"50\" font-family=\"Archivo,sans-serif\" font-size=\"11\" font-weight=\"700\" fill=\"#3d8b3d\">traffico (2013)<\u002Ftext>\n          <!-- AFTER bars (teal) -->\n          <!-- 2014: 7 → h=41 y_top=189 -->\n          <rect x=\"352\" y=\"189\" width=\"36\" height=\"41\" fill=\"#2a6b5a\" rx=\"3\"><\u002Frect>\n          <text x=\"370\" y=\"184\" text-anchor=\"middle\" font-family=\"Archivo,sans-serif\" font-size=\"11\" font-weight=\"700\" fill=\"#2a6b5a\">7<\u002Ftext>\n          <!-- 2015: 5 → h=29 y_top=201 -->\n          <rect x=\"401\" y=\"201\" width=\"36\" height=\"29\" fill=\"#2a6b5a\" rx=\"3\"><\u002Frect>\n          <text x=\"419\" y=\"196\" text-anchor=\"middle\" font-family=\"Archivo,sans-serif\" font-size=\"11\" font-weight=\"700\" fill=\"#2a6b5a\">5<\u002Ftext>\n          <!-- 2016: 2 → h=12 y_top=218 -->\n          <rect x=\"450\" y=\"218\" width=\"36\" height=\"12\" fill=\"#2a6b5a\" rx=\"3\"><\u002Frect>\n          <text x=\"468\" y=\"213\" text-anchor=\"middle\" font-family=\"Archivo,sans-serif\" font-size=\"11\" font-weight=\"700\" fill=\"#2a6b5a\">2<\u002Ftext>\n          <!-- 2017: 4 → h=23 y_top=207 -->\n          <rect x=\"499\" y=\"207\" width=\"36\" height=\"23\" fill=\"#2a6b5a\" rx=\"3\"><\u002Frect>\n          <text x=\"517\" y=\"202\" text-anchor=\"middle\" font-family=\"Archivo,sans-serif\" font-size=\"11\" font-weight=\"700\" fill=\"#2a6b5a\">4<\u002Ftext>\n          <!-- 2018: 4 -->\n          <rect x=\"548\" y=\"207\" width=\"36\" height=\"23\" fill=\"#2a6b5a\" rx=\"3\"><\u002Frect>\n          <text x=\"566\" y=\"202\" text-anchor=\"middle\" font-family=\"Archivo,sans-serif\" font-size=\"11\" font-weight=\"700\" fill=\"#2a6b5a\">4<\u002Ftext>\n          <!-- 2019: 3 → h=17 y_top=213 -->\n          <rect x=\"597\" y=\"213\" width=\"36\" height=\"17\" fill=\"#2a6b5a\" rx=\"3\"><\u002Frect>\n          <text x=\"615\" y=\"208\" text-anchor=\"middle\" font-family=\"Archivo,sans-serif\" font-size=\"11\" font-weight=\"700\" fill=\"#2a6b5a\">3<\u002Ftext>\n          <!-- 2020: 6 → h=35 y_top=195 -->\n          <rect x=\"646\" y=\"195\" width=\"36\" height=\"35\" fill=\"#2a6b5a\" rx=\"3\"><\u002Frect>\n          <text x=\"664\" y=\"190\" text-anchor=\"middle\" font-family=\"Archivo,sans-serif\" font-size=\"11\" font-weight=\"700\" fill=\"#2a6b5a\">6<\u002Ftext>\n          <!-- 2021: 6 -->\n          <rect x=\"695\" y=\"195\" width=\"36\" height=\"35\" fill=\"#2a6b5a\" rx=\"3\"><\u002Frect>\n          <text x=\"713\" y=\"190\" text-anchor=\"middle\" font-family=\"Archivo,sans-serif\" font-size=\"11\" font-weight=\"700\" fill=\"#2a6b5a\">6<\u002Ftext>\n          <!-- x-axis labels -->\n          <text x=\"75\" y=\"248\" text-anchor=\"middle\" font-family=\"Libre Franklin,sans-serif\" font-size=\"11\" fill=\"#9aa3ad\">2008<\u002Ftext>\n          <text x=\"124\" y=\"248\" text-anchor=\"middle\" font-family=\"Libre Franklin,sans-serif\" font-size=\"11\" fill=\"#9aa3ad\">2009<\u002Ftext>\n          <text x=\"173\" y=\"248\" text-anchor=\"middle\" font-family=\"Libre Franklin,sans-serif\" font-size=\"11\" fill=\"#9aa3ad\">2010<\u002Ftext>\n          <text x=\"222\" y=\"248\" text-anchor=\"middle\" font-family=\"Libre Franklin,sans-serif\" font-size=\"11\" fill=\"#9aa3ad\">2011<\u002Ftext>\n          <text x=\"271\" y=\"248\" text-anchor=\"middle\" font-family=\"Libre Franklin,sans-serif\" font-size=\"11\" fill=\"#9aa3ad\">2012<\u002Ftext>\n          <text x=\"320\" y=\"248\" text-anchor=\"middle\" font-family=\"Libre Franklin,sans-serif\" font-size=\"11\" fill=\"#9aa3ad\">2013<\u002Ftext>\n          <text x=\"370\" y=\"248\" text-anchor=\"middle\" font-family=\"Libre Franklin,sans-serif\" font-size=\"11\" fill=\"#9aa3ad\">2014<\u002Ftext>\n          <text x=\"419\" y=\"248\" text-anchor=\"middle\" font-family=\"Libre Franklin,sans-serif\" font-size=\"11\" fill=\"#9aa3ad\">2015<\u002Ftext>\n          <text x=\"468\" y=\"248\" text-anchor=\"middle\" font-family=\"Libre Franklin,sans-serif\" font-size=\"11\" fill=\"#9aa3ad\">2016<\u002Ftext>\n          <text x=\"517\" y=\"248\" text-anchor=\"middle\" font-family=\"Libre Franklin,sans-serif\" font-size=\"11\" fill=\"#9aa3ad\">2017<\u002Ftext>\n          <text x=\"566\" y=\"248\" text-anchor=\"middle\" font-family=\"Libre Franklin,sans-serif\" font-size=\"11\" fill=\"#9aa3ad\">2018<\u002Ftext>\n          <text x=\"615\" y=\"248\" text-anchor=\"middle\" font-family=\"Libre Franklin,sans-serif\" font-size=\"11\" fill=\"#9aa3ad\">2019<\u002Ftext>\n          <text x=\"664\" y=\"248\" text-anchor=\"middle\" font-family=\"Libre Franklin,sans-serif\" font-size=\"11\" fill=\"#9aa3ad\">2020<\u002Ftext>\n          <text x=\"713\" y=\"248\" text-anchor=\"middle\" font-family=\"Libre Franklin,sans-serif\" font-size=\"11\" fill=\"#9aa3ad\">2021<\u002Ftext>\n          <!-- legend -->\n          <rect x=\"50\" y=\"262\" width=\"14\" height=\"10\" fill=\"#13283f\" rx=\"2\"><\u002Frect>\n          <text x=\"68\" y=\"272\" font-family=\"Libre Franklin,sans-serif\" font-size=\"11\" fill=\"#7d8794\">Prima della chiusura<\u002Ftext>\n          <rect x=\"220\" y=\"262\" width=\"14\" height=\"10\" fill=\"#2a6b5a\" rx=\"2\"><\u002Frect>\n          <text x=\"238\" y=\"272\" font-family=\"Libre Franklin,sans-serif\" font-size=\"11\" fill=\"#7d8794\">Dopo la chiusura (2013)<\u002Ftext>\n        <\u002Fsvg>\n      <\u002Fdiv>\n\n      <div style=\"background:#f0f7f0;border:1px solid #c4e0c4;border-left:4px solid #3d8b3d;border-radius:14px;padding:22px 26px;margin-bottom:30px;\">\n        <h4 style=\"font-family:'Archivo',sans-serif;font-weight:700;font-size:17px;color:#2a4a2a;margin:0 0 8px;\">E cosi che si azzerano gli incidenti: si toglie il traffico<\u002Fh4>\n        <p style=\"font-size:16px;line-height:1.6;margin:0;color:#2a4a2a;\">La pedonalizzazione dei Fori è l'unico grande intervento di rimozione del traffico chiaramente visibile nei quindici anni di dati. Il problema non è sapere <em>se<\u002Fem> funziona, ma che in quindici anni Roma lo ha fatto <strong>una volta sola<\u002Fstrong>, su una strada monumentale del centro, non sulle arterie di periferia dove i pedoni muoiono davvero.<\u002Fp>\n      <\u002Fdiv>\n\n      <h3 style=\"font-family:'Archivo',sans-serif;font-weight:700;font-size:21px;color:#13283f;margin:0 0 12px;\">Le altre strade azzerate: perché vanno prese con le pinze<\u002Fh3>\n      <div style=\"overflow-x:auto;-webkit-overflow-scrolling:touch;border:1px solid #ece6db;border-radius:14px;box-shadow:0 1px 2px rgba(19,40,63,.05);margin-bottom:18px;\">\n        <table style=\"border-collapse:collapse;width:100%;min-width:500px;font-size:15px;background:#fff;\">\n          <thead><tr style=\"background:#13283f;color:#fff;\">\n            <th style=\"text-align:left;padding:14px 18px;font-family:'Archivo';font-weight:700;font-size:13.5px;\">Strada<\u002Fth>\n            <th style=\"text-align:center;padding:14px 18px;font-family:'Archivo';font-weight:700;font-size:13.5px;\">Inc./anno 2008-11<\u002Fth>\n            <th style=\"text-align:center;padding:14px 18px;font-family:'Archivo';font-weight:700;font-size:13.5px;\">Inc./anno 2018-21<\u002Fth>\n            <th style=\"text-align:center;padding:14px 18px;font-family:'Archivo';font-weight:700;font-size:13.5px;\">Calo<\u002Fth>\n          <\u002Ftr><\u002Fthead>\n          <tbody>\n            <tr style=\"border-bottom:1px solid #f0ece3;\"><td style=\"padding:12px 18px;\">Via Val Di Lanzo<\u002Ftd><td style=\"text-align:center;padding:12px 18px;\">22,0<\u002Ftd><td style=\"text-align:center;padding:12px 18px;\">4,2<\u002Ftd><td style=\"text-align:center;padding:12px 18px;font-weight:600;color:#3d8b3d;\">-81%<\u002Ftd><\u002Ftr>\n            <tr style=\"border-bottom:1px solid #f0ece3;background:#faf8f4;\"><td style=\"padding:12px 18px;\">Via Pellegrino Matteucci<\u002Ftd><td style=\"text-align:center;padding:12px 18px;\">20,5<\u002Ftd><td style=\"text-align:center;padding:12px 18px;\">5,2<\u002Ftd><td style=\"text-align:center;padding:12px 18px;font-weight:600;color:#3d8b3d;\">-74%<\u002Ftd><\u002Ftr>\n            <tr style=\"border-bottom:1px solid #f0ece3;\"><td style=\"padding:12px 18px;\">Via Lido Di Castel Porziano<\u002Ftd><td style=\"text-align:center;padding:12px 18px;\">20,2<\u002Ftd><td style=\"text-align:center;padding:12px 18px;\">5,2<\u002Ftd><td style=\"text-align:center;padding:12px 18px;font-weight:600;color:#3d8b3d;\">-74%<\u002Ftd><\u002Ftr>\n            <tr style=\"border-bottom:1px solid #f0ece3;background:#faf8f4;\"><td style=\"padding:12px 18px;\">Piazza Tolosetto Farinati<\u002Ftd><td style=\"text-align:center;padding:12px 18px;\">17,0<\u002Ftd><td style=\"text-align:center;padding:12px 18px;\">1,2<\u002Ftd><td style=\"text-align:center;padding:12px 18px;font-weight:600;color:#3d8b3d;\">-93%<\u002Ftd><\u002Ftr>\n            <tr style=\"border-bottom:1px solid #f0ece3;\"><td style=\"padding:12px 18px;\">Via Accademia Degli Agiati<\u002Ftd><td style=\"text-align:center;padding:12px 18px;\">14,0<\u002Ftd><td style=\"text-align:center;padding:12px 18px;\">3,0<\u002Ftd><td style=\"text-align:center;padding:12px 18px;font-weight:600;color:#3d8b3d;\">-79%<\u002Ftd><\u002Ftr>\n            <tr><td style=\"padding:12px 18px;\">Via Delle Terme Di Diocleziano<\u002Ftd><td style=\"text-align:center;padding:12px 18px;\">12,5<\u002Ftd><td style=\"text-align:center;padding:12px 18px;\">3,5<\u002Ftd><td style=\"text-align:center;padding:12px 18px;font-weight:600;color:#3d8b3d;\">-72%<\u002Ftd><\u002Ftr>\n          <\u002Ftbody>\n        <\u002Ftable>\n      <\u002Fdiv>\n      <div style=\"background:#fdf6ec;border:1px solid #f3e3c6;border-left:4px solid #e0922f;border-radius:14px;padding:20px 26px;font-size:15.5px;line-height:1.6;color:#5a4a32;\">\n        <strong style=\"color:#3f3320;\">Attenzione agli artefatti.<\u002Fstrong> Non tutti i salti sono interventi. Molte «nuove» strade sono in realtà rinomine: «Via Cristoforo Colombo» diventa «Viale Cristoforo Colombo» dal 2019, spezzando i record dello stesso asse. Senza il registro comunale degli interventi questi casi restano <strong>candidati da verificare<\u002Fstrong>. L'unico su cui abbiamo certezza esterna, i Fori, conferma però che il metodo funziona.\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- 06 -->\n    <section data-screen-label=\"06 Metodo prima/dopo\" style=\"margin-top:64px;\">\n      <div style=\"display:flex;align-items:center;gap:16px;margin-bottom:10px;\">\n        <span style=\"font-family:'Archivo',sans-serif;font-weight:800;font-size:15px;color:#c4112f;letter-spacing:.06em;\">06<\u002Fspan>\n        <span style=\"flex:1;height:2px;background:#e2dccf;\"><\u002Fspan>\n      <\u002Fdiv>\n      <h2 style=\"font-family:'Archivo',sans-serif;font-weight:800;font-size:clamp(24px,4.8vw,34px);line-height:1.1;color:#13283f;margin:0 0 18px;letter-spacing:-.015em;\">Misurare l'effetto di un intervento: il metodo prima/dopo<\u002Fh2>\n      <p style=\"font-size:17px;line-height:1.65;max-width:68ch;margin:0 0 16px;\">Non basta confrontare i morti prima e dopo: i morti calano <strong>dappertutto<\u002Fstrong> (-2,2%/anno), quindi una riduzione locale potrebbe essere solo l'eco del trend cittadino. Il metodo corretto è la <strong>differenza-nelle-differenze<\u002Fstrong>: si confronta la variazione sul tratto trattato con la variazione nel <strong>resto della città<\u002Fstrong> nello stesso periodo.<\u002Fp>\n      <p style=\"font-size:17px;line-height:1.65;max-width:68ch;margin:0 0 22px;\">Lo applichiamo alla <strong>chiusura dei Fori Imperiali (2013)<\u002Fstrong>, confrontando il prima (2008-2012) col dopo (2014-2021):<\u002Fp>\n\n      <div style=\"overflow-x:auto;-webkit-overflow-scrolling:touch;border:1px solid #ece6db;border-radius:14px;box-shadow:0 1px 2px rgba(19,40,63,.05);margin-bottom:18px;\">\n        <table style=\"border-collapse:collapse;width:100%;min-width:520px;font-size:15px;background:#fff;\">\n          <thead><tr style=\"background:#13283f;color:#fff;\">\n            <th style=\"text-align:left;padding:14px 18px;font-family:'Archivo';font-weight:700;font-size:13.5px;\">Gruppo<\u002Fth>\n            <th style=\"text-align:center;padding:14px 18px;font-family:'Archivo';font-weight:700;font-size:13.5px;\">Inc./anno 2008-12<\u002Fth>\n            <th style=\"text-align:center;padding:14px 18px;font-family:'Archivo';font-weight:700;font-size:13.5px;\">Inc./anno 2014-21<\u002Fth>\n            <th style=\"text-align:center;padding:14px 18px;font-family:'Archivo';font-weight:700;font-size:13.5px;\">Variazione<\u002Fth>\n          <\u002Ftr><\u002Fthead>\n          <tbody>\n            <tr style=\"border-bottom:1px solid #f0ece3;\"><td style=\"padding:13px 18px;font-weight:600;\">Via dei Fori Imperiali <span style=\"font-size:12px;color:#7d8794;font-weight:400;\">(trattato)<\u002Fspan><\u002Ftd><td style=\"text-align:center;padding:13px 18px;\">24,6<\u002Ftd><td style=\"text-align:center;padding:13px 18px;\">4,6<\u002Ftd><td style=\"text-align:center;padding:13px 18px;font-family:'Archivo';font-weight:800;color:#3d8b3d;\">-81%<\u002Ftd><\u002Ftr>\n            <tr><td style=\"padding:13px 18px;\">Resto di Roma <span style=\"font-size:12px;color:#7d8794;font-weight:400;\">(controllo)<\u002Fspan><\u002Ftd><td style=\"text-align:center;padding:13px 18px;\">34.995<\u002Ftd><td style=\"text-align:center;padding:13px 18px;\">28.294<\u002Ftd><td style=\"text-align:center;padding:13px 18px;font-family:'Archivo';font-weight:800;color:#7d8794;\">-19%<\u002Ftd><\u002Ftr>\n          <\u002Ftbody>\n        <\u002Ftable>\n      <\u002Fdiv>\n\n      <div style=\"background:#fff;border:1px solid #ece6db;border-radius:14px;padding:24px 28px;box-shadow:0 1px 2px rgba(19,40,63,.05);margin-bottom:18px;display:flex;align-items:center;gap:24px;\">\n        <div style=\"font-family:'Archivo';font-weight:900;font-size:48px;line-height:1;color:#3d8b3d;flex:none;\">77%<\u002Fdiv>\n        <div style=\"font-size:16px;line-height:1.6;color:#3f4954;\">di calo in più rispetto a quanto sarebbe sceso comunque. La <strong>differenza-nelle-differenze<\u002Fstrong> isola l'effetto netto della chiusura. È cosi che si misura se un intervento funziona.<\u002Fdiv>\n      <\u002Fdiv>\n\n      <p style=\"font-size:14px;line-height:1.6;color:#7d8794;margin:0 2px 18px;font-style:italic;\">Per confronto, applicando lo stesso strumento alla Via Casilina (dove non risulta alcun intervento), la differenza-nelle-differenze è di segno opposto: la Casilina <strong>diverge in peggio<\u002Fstrong> dalla città, un corridoio che chiede un intervento, non uno che ne ha ricevuto uno.<\u002Fp>\n\n      <div style=\"background:#fbe9ec;border:1px solid #f1c4cc;border-left:4px solid #c4112f;border-radius:14px;padding:20px 26px;font-size:15.5px;line-height:1.6;color:#6e2230;\">\n        <strong style=\"color:#5a1622;\">Il pezzo mancante: il registro degli interventi.<\u002Fstrong> Per passare dalla diagnosi alla valutazione serve un dato che oggi <strong>non è<\u002Fstrong> nel portale open data: <strong>quali interventi sono stati fatti, dove e quando<\u002Fstrong> (Zone 30, attraversamenti rialzati, dossi, nuovi semafori pedonali), con data di attivazione e geometria. Con quel registro, lo strumento produce per ciascun intervento una stima d'effetto al netto del trend cittadino.\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- 07 -->\n    <section data-screen-label=\"07 Le priorità\" style=\"margin-top:64px;\">\n      <div style=\"display:flex;align-items:center;gap:16px;margin-bottom:10px;\">\n        <span style=\"font-family:'Archivo',sans-serif;font-weight:800;font-size:15px;color:#c4112f;letter-spacing:.06em;\">07<\u002Fspan>\n        <span style=\"flex:1;height:2px;background:#e2dccf;\"><\u002Fspan>\n      <\u002Fdiv>\n      <h2 style=\"font-family:'Archivo',sans-serif;font-weight:800;font-size:clamp(24px,4.8vw,34px);line-height:1.1;color:#13283f;margin:0 0 18px;letter-spacing:-.015em;\">Le priorità, ora che sappiamo dove guardare<\u002Fh2>\n      <div style=\"display:flex;flex-direction:column;gap:16px;\">\n        <div style=\"display:flex;gap:22px;background:#fff;border:1px solid #ece6db;border-radius:14px;padding:26px 28px;box-shadow:0 1px 2px rgba(19,40,63,.05);\">\n          <div style=\"font-family:'Archivo';font-weight:900;font-size:40px;line-height:1;color:#c4112f;flex:none;width:54px;\">01<\u002Fdiv>\n          <div>\n            <h4 style=\"font-family:'Archivo',sans-serif;font-weight:700;font-size:19px;color:#13283f;margin:0 0 8px;\">Trattare i sei punti critici identificati<\u002Fh4>\n            <p style=\"font-size:16px;line-height:1.6;margin:0;color:#3f4954;\">Casilina-Santarelli, Tiburtina-Portonaccio, Prenestina-Largo Preneste, Togliatti-Sesami, Ostiense-Porto Fluviale, Tuscolana-Veturia. Sono incroci precisi: attraversamenti rialzati, isole salvagente, semafori pedonali. Costo contenuto, bersaglio noto.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;gap:22px;background:#fff;border:1px solid #ece6db;border-radius:14px;padding:26px 28px;box-shadow:0 1px 2px rgba(19,40,63,.05);\">\n          <div style=\"font-family:'Archivo';font-weight:900;font-size:40px;line-height:1;color:#c4112f;flex:none;width:54px;\">02<\u002Fdiv>\n          <div>\n            <h4 style=\"font-family:'Archivo',sans-serif;font-weight:700;font-size:19px;color:#13283f;margin:0 0 8px;\">Portare in periferia cio che ha funzionato al centro<\u002Fh4>\n            <p style=\"font-size:16px;line-height:1.6;margin:0;color:#3f4954;\">La chiusura dei Fori ha azzerato gli incidenti su quella strada, ma è stata l'<em>unica<\u002Fem> grande rimozione di traffico in quindici anni, e nel centro monumentale. La stessa logica va applicata ai tratti delle consolari dove i pedoni muoiono davvero, non solo dove passano i turisti.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;gap:22px;background:#fff;border:1px solid #ece6db;border-radius:14px;padding:26px 28px;box-shadow:0 1px 2px rgba(19,40,63,.05);\">\n          <div style=\"font-family:'Archivo';font-weight:900;font-size:40px;line-height:1;color:#c4112f;flex:none;width:54px;\">03<\u002Fdiv>\n          <div>\n            <h4 style=\"font-family:'Archivo',sans-serif;font-weight:700;font-size:19px;color:#13283f;margin:0 0 8px;\">Iniziare a misurare sul serio<\u002Fh4>\n            <p style=\"font-size:16px;line-height:1.6;margin:0;color:#3f4954;\">Pubblicare il registro degli interventi (date e luoghi) e monitorare i <em>feriti<\u002Fem> pedoni, non solo i morti. Con quel registro, lo strumento prima/dopo può valutare automaticamente ogni intervento futuro.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- METHODOLOGY -->\n    <section style=\"margin-top:56px;border-top:2px solid #e2dccf;padding-top:32px;\">\n      <details>\n        <summary style=\"cursor:pointer;font-family:'Archivo',sans-serif;font-weight:700;font-size:17px;color:#13283f;list-style:none;\">Note metodologiche e qualita dei dati<\u002Fsummary>\n        <div style=\"margin-top:18px;display:flex;flex-direction:column;gap:14px;font-size:13.5px;line-height:1.6;color:#6a7480;max-width:80ch;\">\n          <p style=\"margin:0;\"><strong style=\"color:#46505b;\">Fonte.<\u002Fstrong> Portale open data di Roma Capitale (<code>dati.comune.roma.it<\u002Fcode>, CKAN), gruppo Sicurezza Urbana. Un dataset per anno (2008-2022), CSV mensili. 846.691 righe a livello di persona, de-duplicate per (anno, Protocollo, Progressivo). Il 2022 contiene solo gennaio-agosto.<\u002Fp>\n          <p style=\"margin:0;\"><strong style=\"color:#46505b;\">Schema.<\u002Fstrong> 37 colonne presenti in tutti gli anni. Le coordinate si chiamano <code>Latitudine<\u002Fcode>/<code>Longitudine<\u002Fcode> fino al 2018 e <code>Latitude<\u002Fcode>/<code>Longitude<\u002Fcode> dal 2019. Il formato data acquisisce i secondi dal 2018.<\u002Fp>\n          <p style=\"margin:0;\"><strong style=\"color:#46505b;\">Ricostruzione decessi.<\u002Fstrong> La colonna <code>Deceduto<\u002Fcode> è inutilizzabile (codifica -1). I morti sono ricostruiti da <code>Tipolesione<\u002Fcode> e <code>DecedutoDopo<\u002Fcode>. A differenza dell'analisi su singolo anno, qui gli anni piu vecchi sono completi: 159 morti nel 2008, 171 nel 2009, in linea con le statistiche ufficiali. Gli anni recenti (2021-2022) restano un limite inferiore.<\u002Fp>\n          <p style=\"margin:0;\"><strong style=\"color:#46505b;\">Geolocalizzazione.<\u002Fstrong> Le coordinate sono assenti o quasi fino al 2012 (copertura 0%), compaiono dal 2013-2014 (95%+). Per questo l'analisi storica delle strade usa i campi testuali <code>STRADA1<\u002Fcode>/<code>STRADA2<\u002Fcode>, disponibili per tutti gli anni.<\u002Fp>\n          <p style=\"margin:0;\"><strong style=\"color:#46505b;\">Strade croniche.<\u002Fstrong> Morti pedoni aggregati per <code>STRADA1<\u002Fcode>. «Anni distinti» = numero di anni civili con almeno un morto pedone su quella strada. Il conteggio per nome non distingue tratti diversi della stessa via: è una misura di corridoio.<\u002Fp>\n          <p style=\"margin:0;\"><strong style=\"color:#46505b;\">Hotspot interni.<\u002Fstrong> Solo incidenti pedonali geolocalizzati 2014-2022. Punti proiettati in UTM 32N e aggregati su griglia di 250 m. Sono mostrate solo le celle con almeno 5 incidenti pedonali. La griglia indica il tratto, non l'esatto punto d'impatto.<\u002Fp>\n          <p style=\"margin:0;\"><strong style=\"color:#46505b;\">Difference-in-differences.<\u002Fstrong> Gruppo trattato = strada selezionata; controllo = tutti gli altri incidenti della citta. DiD = (variazione trattato) - (variazione controllo), che rimuove il trend comune. Il caso Fori è una validazione (intervento noto e datato); l'applicazione alla Casilina è descrittiva. Per stime causali su altri interventi servono data e luogo reali.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdetails>\n    <\u002Fsection>\n  <\u002Fmain>\n\n  <!-- FOOTER -->\n  <footer style=\"background:#0e2034;color:#8fa6bd;padding:36px 28px;margin-top:0;\">\n    <div style=\"max-width:1080px;margin:0 auto;display:flex;align-items:center;gap:16px;flex-wrap:wrap;\">\n      <div style=\"width:42px;height:42px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;flex:none;\">\n        <img src=\"2dbeee5b-054c-4f60-893e-32c32d523997\" alt=\"\" style=\"width:38px;height:38px;border-radius:50%;object-fit:cover;display:block;\">\n      <\u002Fdiv>\n      <div style=\"font-size:13px;line-height:1.5;\">\n        <strong style=\"color:#fff;font-family:'Archivo';\">Diritti dei Pedoni<\u002Fstrong><br>\n        Elaborazione 21/06/2026. Dati: Roma Capitale - Polizia Locale (portale open data CKAN, CC-BY). Serie storica 2008-2022.\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Ffooter>\n\n<\u002Fdiv>\n\n\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\n\nclass Component extends DCLogic {\n  componentDidMount() { this._initMap(); }\n  componentWillUnmount() { if (this._t) clearTimeout(this._t); }\n\n  _initMap() {\n    const L = window.L;\n    const D = window.ANALISI_MAP;\n    const el = document.getElementById('map-hotspots');\n    if (!L || !D || !el) { this._t = setTimeout(() => this._initMap(), 150); return; }\n    if (this._mapDone) return;\n    this._mapDone = true;\n\n    const m = L.map(el, { scrollWheelZoom: false });\n    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {\n      subdomains: 'abcd', maxZoom: 19,\n      attribution: '&copy; OpenStreetMap, &copy; CARTO'\n    }).addTo(m);\n\n    D.forEach(d => {\n      L.circleMarker([d.lat, d.lng], {\n        radius: Math.max(6, d.r * 0.75),\n        color: '#fff', weight: 1.5,\n        fillColor: d.color, fillOpacity: 0.88\n      }).bindPopup(d.popup || '').addTo(m);\n    });\n\n    const bounds = D.map(d => [d.lat, d.lng]);\n    try { m.fitBounds(bounds, { padding: [36, 36] }); } catch(e) {}\n  }\n\n  renderVals() { return {}; }\n}\n\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
