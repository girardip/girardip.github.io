<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pedro Girardi | Parliamo</title>
  <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@300;400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    body {
      font-family: 'Merriweather', serif;
      margin: 0;
      padding: 0;
      background-color: #FDF7F1;
      color: #333;
      text-align: center;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      height: 100vh;
    }

    .chat-container {
      padding: 50px 20px;
      margin-left: 25%;
      margin-right: 25%;
      flex-grow: 1;
    }

    h1 {
      font-size: 2.5rem;
      font-weight: bold;
      margin-bottom: 20px;
    }

    p {
      font-size: 1.2rem;
      line-height: 1.5;
    }

    header {
      background-color: #FFFFFF;
      padding: 20px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #e6dfd2;
    }

    .lang-switcher {
      display: flex;
      gap: 4px;
    }

    .lang-btn {
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      padding: 4px 10px;
      border-radius: 999px;
      color: #4f5b66;
      border: 1px solid #e6dfd2;
      text-decoration: none;
      transition: color 0.2s ease, border-color 0.2s ease;
    }

    .lang-btn.active {
      color: #8e6a2d;
      border-color: #b0843d;
      background-color: rgba(176, 132, 61, 0.08);
    }

    footer {
      background-color: #333;
      color: #FFFFFF;
      text-align: center;
      padding: 20px 0;
    }

    footer .contact-info {
      margin-bottom: 10px;
    }

    footer .contact-info p {
      margin: 5px 0;
    }

    footer nav ul {
      list-style: none;
      display: flex;
      justify-content: center;
      gap: 20px;
    }

    footer nav ul li a {
      color: #FFFFFF;
      text-decoration: none;
      font-size: 0.9rem;
    }

    footer .social-icons {
      margin-top: 10px;
    }

    footer .social-icons a {
      color: #FFFFFF;
      font-size: 0.9rem;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
    }

    footer .social-icons img {
      width: 20px;
      height: 20px;
      margin-right: 5px;
    }
  </style>
</head>
<body>
  <!-- Header -->
  <header>
    <h1 class="logo"><a href="index-it.html" style="text-decoration: none; color: inherit;">PEDRO GIRARDI</a></h1>
    <div class="lang-switcher">
      <a href="chat.html" class="lang-btn">EN</a>
      <a href="chat-it.html" class="lang-btn active">IT</a>
    </div>
  </header>

  <!-- Parliamo Section -->
  <div class="chat-container">
    <h1>Parliamo!</h1>
    <p>Se vuoi metterti in contatto, inviami un'email a <a href="mailto:contact@girardi.io">contact@girardi.io</a> o aggiungimi su <a href="https://www.linkedin.com/in/pedrogirardi/">LinkedIn</a>. Sarò felice di conoscerti e discutere di eventuali collaborazioni future.</p>
  </div>

  <!-- Footer -->
  <footer>
    <div class="container">
      <div class="contact-info">
        <p>contact@girardi.io</p>
        <p>P.IVA 01586900522</p>
      </div>
      <nav>
        <ul>
          <li><a href="privacyPolicy.html">Informativa sulla Privacy</a></li>
        </ul>
      </nav>
      <div class="social-icons">
        <a href="https://www.linkedin.com/in/pedrogirardi/" target="_blank">
          <img src="linkedinLogo.webp" alt="LinkedIn">
        </a>
      </div>
    </div>
  </footer>
</body>
</html>
